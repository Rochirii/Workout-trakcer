<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#08111f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily System">
    <title>Daily System</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="system-panel" aria-label="Daily workout system">
        <div class="hero-orbit" aria-hidden="true">
          <div class="gate-ring ring-one"></div>
          <div class="gate-ring ring-two"></div>
          <div class="gate-core"></div>
        </div>

        <header class="topbar">
          <div>
            <p class="eyebrow">Daily Quest</p>
            <h1>Awaken Protocol</h1>
          </div>
          <button class="icon-button" id="resetDayButton" type="button" aria-label="Reroll today's quest" title="Reroll today's quest">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          </button>
        </header>

        <div class="rank-strip">
          <div>
            <span class="label">Rank</span>
            <strong id="rankLabel">E</strong>
          </div>
          <div>
            <span class="label">Level</span>
            <strong id="levelLabel">1</strong>
          </div>
          <div>
            <span class="label">Streak</span>
            <strong id="streakLabel">0</strong>
          </div>
        </div>

        <div class="xp-block">
          <div class="xp-copy">
            <span id="xpLabel">0 / 100 EXP</span>
            <span id="focusLabel">Balanced</span>
          </div>
          <div class="xp-track" aria-label="Experience progress">
            <div class="xp-fill" id="xpFill"></div>
          </div>
        </div>

        <section class="quest-card" aria-labelledby="questTitle">
          <div class="quest-heading">
            <div>
              <p class="eyebrow">Today's Assignments</p>
              <h2 id="questTitle">System Loading</h2>
            </div>
            <span class="difficulty" id="difficultyLabel">Normal</span>
          </div>
          <div class="quest-list" id="questList"></div>
          <button class="claim-button" id="claimButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
            Claim Rewards
          </button>
        </section>
      </section>

      <section class="stats-panel" aria-label="Hunter stats">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Hunter Profile</p>
            <h2 id="hunterName">Rookie Hunter</h2>
          </div>
          <button class="icon-button" id="settingsButton" type="button" aria-label="Open settings" title="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.2 2.2 0 0 1-3.11 3.11l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.09 1.65V21a2.2 2.2 0 0 1-4.4 0v-.06a1.8 1.8 0 0 0-1.09-1.65 1.8 1.8 0 0 0-1.98.36l-.04.04a2.2 2.2 0 1 1-3.11-3.11l.04-.04a1.8 1.8 0 0 0 .36-1.98 1.8 1.8 0 0 0-1.65-1.09H3a2.2 2.2 0 1 1 0-4.4h.06a1.8 1.8 0 0 0 1.65-1.09 1.8 1.8 0 0 0-.36-1.98l-.04-.04a2.2 2.2 0 0 1 3.11-3.11l.04.04a1.8 1.8 0 0 0 1.98.36A1.8 1.8 0 0 0 10.53 3V3a2.2 2.2 0 0 1 4.4 0v.06a1.8 1.8 0 0 0 1.09 1.65 1.8 1.8 0 0 0 1.98-.36l.04-.04a2.2 2.2 0 0 1 3.11 3.11l-.04.04a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.65 1.09H21a2.2 2.2 0 1 1 0 4.4h-.06A1.8 1.8 0 0 0 19.4 15Z"/></svg>
          </button>
        </div>

        <div class="stat-grid" id="statGrid"></div>

        <div class="mode-panel">
          <label for="trainingMode">Training Focus</label>
          <select id="trainingMode">
            <option value="balanced">Balanced</option>
            <option value="strength">Strength</option>
            <option value="core">Core</option>
            <option value="stamina">Stamina</option>
            <option value="mobility">Mobility</option>
          </select>
        </div>

        <div class="history-panel">
          <div class="panel-heading compact">
            <div>
              <p class="eyebrow">Activity Log</p>
              <h2>Recent Clears</h2>
            </div>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </section>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" class="settings-form">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">System Settings</p>
            <h2>Personalize</h2>
          </div>
          <button class="icon-button" value="close" aria-label="Close settings">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <label>
          Hunter Name
          <input id="nameInput" type="text" maxlength="24" autocomplete="name">
        </label>
        <label>
          Starting Fitness
          <select id="fitnessInput">
            <option value="beginner">Beginner</option>
            <option value="active">Active</option>
            <option value="advanced">Advanced</option>
          </select>
        </label>
        <label class="toggle-row">
          <span>Include jumping moves</span>
          <input id="jumpInput" type="checkbox">
        </label>
        <button class="claim-button" id="saveSettingsButton" value="default" type="submit">Save</button>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
